version: '3.8'

services:

  # ── Frontend (React + Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_MINIO_PUBLIC_URL: ${VITE_MINIO_PUBLIC_URL}
        VITE_MINIO_BUCKET: ${VITE_MINIO_BUCKET:-personalcreativeshop}
        VITE_ADMIN_URL: ${VITE_ADMIN_URL:-/painel}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_META_PIXEL_ID: ${VITE_META_PIXEL_ID:-}
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  # ── Admin redirect ─────────────────────────────────────────────────────────
  # Serviço leve: redireciona dash.personalcreativemz.com → www.dominio.com/painel
  # No Coolify aparece o campo "Domains for admin" — coloque dash.personalcreativemz.com
  # Variável obrigatória no Coolify:
  #   ADMIN_REDIRECT_URL=https://www.personalcreativemz.com/painel
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    restart: unless-stopped
    expose:
      - "80"
    environment:
      # URL completa para onde dash.dominio.com vai redirecionar.
      # Definir directamente no Coolify → Environment Variables do serviço admin.
      ADMIN_REDIRECT_URL: "${ADMIN_REDIRECT_URL:-https://grafica.personalcreativemz.com/painel}"
    depends_on:
      - frontend

  # ── Backend (Express / Node.js) ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    expose:
      - "3060"
    environment:
      PORT: ${PORT:-3060}
      # PostgreSQL
      PG_HOST: ${PG_HOST}
      PG_PORT: ${PG_PORT:-5432}
      PG_DATABASE: ${PG_DATABASE:-naturerva_erp}
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD}
      # Migração automática: coloca true apenas no PRIMEIRO deploy, depois volta a false
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      # CORS
      FRONTEND_URL: ${FRONTEND_URL}
      APP_URL: ${APP_URL:-}
      # MinIO (externo)
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT:-443}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-true}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-public}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      # Email (Resend)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3060/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
